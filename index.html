<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover why Optimizely Opal is the smarter AI alternative to Writer for Logitech. AI-powered content creation, experimentation, personalization, and commerce in one platform." />
    <title>Optimizely Opal vs Writer AI | The Smarter Alternative for Logitech</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.optimizely.com" />

    <!-- Google Fonts - async loaded to avoid render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..700&display=swap" /></noscript>

    <!-- Inline critical CSS to prevent FOUC and speed up FCP -->
    <style>
      body{background-color:#10141d;color:#e9ebf1;margin:0;font-family:'Figtree',Arial,sans-serif}
      #root{min-height:100vh}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
